<!doctype html>
<html>
  <head>
    <title>Classroom</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Google_Classroom_Logo.svg/960px-Google_Classroom_Logo.svg.png">
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        background: #0f172a;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      }

      button {
        border: none;
        background: none;
        height: 400px;
        width: 400px;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: width 0.3s ease-in-out, height 0.3s ease-in-out;
      }

      button:hover {
        width: 450px;
        height: 450px;
      }

      img {
        height: 400px;
        width: 400px;
        transition: width 0.3s ease-in-out, height 0.3s ease-in-out;
      }

      img:hover {
        width: 450px;
        height: 450px;
      }

      h1 {
        font-size: 3rem;
        margin-bottom: 16px;
      }

      .controls {
        margin-top: 20px;
        font-size: 18px;
      }

      input[type="range"] {
        width: 300px;
      }
    </style>
  </head>

  <body>

<h1>Smoke Detector</h1>

<button onclick="playBeep()">
  <img src="Detector.png">
</button>

<div class="controls">
  <p>Beep interval: <span id="intervalValue">30</span> seconds</p>
  <input type="range" id="intervalSlider" min="5" max="120" value="30">
</div>

<audio id="beep" src="Beep.mp3" preload="auto"></audio>

<script>
const beep = document.getElementById("beep");
const slider = document.getElementById("intervalSlider");
const intervalValue = document.getElementById("intervalValue");

let beepInterval;

function playBeep() {
  beep.currentTime = 0;
  beep.play();
}

function startBeeping() {
  clearInterval(beepInterval);
  const seconds = slider.value;
  beepInterval = setInterval(playBeep, seconds * 1000);
}

slider.addEventListener("input", () => {
  intervalValue.textContent = slider.value;
  startBeeping();
});

// spacebar plays beep
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    e.preventDefault();
    playBeep();
  }
});

// start on load
startBeeping();
</script>

  </body>
</html>
