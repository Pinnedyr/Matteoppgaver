<!doctype html>
<html>
  <head>
    <title>Classroom</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Google_Classroom_Logo.svg/960px-Google_Classroom_Logo.svg.png">
    <style>
      body {
        text-align: center;
      }
      button {
        border: none;
        
      }
    </style>
  </head>
  <body>
    
    <script>
(function(){
    const allowedParent = "https://www.wtfq.online/Tokens/games/Smoke.html";
    let valid = false;
    try { if(window.top !== window.self){ valid = window.parent.location.href.startsWith(allowedParent); } else { valid = document.referrer.startsWith(allowedParent); } }
    catch(e){ valid = false; }
    if(!valid){ document.documentElement.innerHTML=""; setTimeout(()=>{window.location.href=allowedParent;},100); }
})();
</script>

    <h1>Smoke Detector</h1> <br>
    <button><img src="Detector.png"></button>
    
    
  </body>
</html>
