<!doctype html>
<html>
  <head>
    <title>Classroom</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Google_Classroom_Logo.svg/960px-Google_Classroom_Logo.svg.png">
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;

      text-align: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      }
      button {
        border: none;
        background: none;
        height: 400px;
        width: 400px;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: width 0.3s ease-in-out, height 0.3s ease-in-out;
      }
      button:hover {
        width: 450px;
        height: 450px;
      }
      img {
        height: 400px;
        width: 400px;
        transition: width 0.3s ease-in-out, height 0.3s ease-in-out;
      }
      img:hover {
        width: 450px;
        height: 450px;
      }
      h1 {
        font-size: 3rem;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
<h1>Smoke Detector</h1><br>

<button onclick="playBeep()">
  <img src="Detector.png">
</button>

<audio id="beep" src="Beep.mp3" preload="auto"></audio>

<script>
const beep = document.getElementById("beep");

function playBeep() {
  beep.currentTime = 0;
  beep.play();
}

// function to schedule the next random beep
function scheduleBeep() {
  const randomDelay = Math.random() * (60000 - 30000) + 30000; // 30–60 seconds

  setTimeout(() => {
    playBeep();
    scheduleBeep(); // schedule the next one
  }, randomDelay);
}

// start the random beeping
scheduleBeep();
</script>
  </body>
</html>
