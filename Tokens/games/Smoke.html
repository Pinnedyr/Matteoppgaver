<!doctype html>
<html>
  <head>
    <title>Classroom</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Google_Classroom_Logo.svg/960px-Google_Classroom_Logo.svg.png">
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        background: #0f172a;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        margin: 0;
        overflow: hidden;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 12px;
      }

      .controls {
        margin-top: 10px;
        font-size: 16px;
      }

      input[type="range"] {
        width: 200px;
      }

      label {
        margin-left: 8px;
      }

      .detector-container {
        position: relative;
        width: 200px;
        height: 200px;
        margin-bottom: 12px;
      }

      #detectorButton {
        border: none;
        background: none;
        width: 100%;
        height: 100%;
        padding: 0;
        cursor: pointer;
        position: relative;
        z-index: 2;
      }

      #detectorImg {
        width: 100%;
        height: 100%;
        display: block;
        transition: transform 0.1s;
      }

      .red-light {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 0, 0, 0.4);
        border-radius: 50%;
        opacity: 0;
        pointer-events: none;
        z-index: 1;
        transition: opacity 0.3s ease-out;
      }

      @keyframes shake {
        0% { transform: translate(0, 0) rotate(0deg); }
        20% { transform: translate(-1px, 1px) rotate(-2deg); }
        40% { transform: translate(1px, -1px) rotate(2deg); }
        60% { transform: translate(-1px, 1px) rotate(-2deg); }
        80% { transform: translate(1px, -1px) rotate(2deg); }
        100% { transform: translate(0, 0) rotate(0deg); }
      }
    </style>
  </head>

  <body>

<h1>Smoke Detector</h1>

<div class="detector-container">
  <div class="red-light" id="redLight"></div>
  <button id="detectorButton">
    <img id="detectorImg" src="Detector.png" alt="Smoke Detector">
  </button>
</div>

<div class="controls">
  <p>Beep interval: <span id="intervalValue">30</span> seconds</p>
  <input type="range" id="intervalSlider" min="5" max="120" value="30">
  <p>
    <input type="checkbox" id="autoToggle" checked>
    <label for="autoToggle">Auto Beep</label>
  </p>
</div>

<audio id="beep" src="Beep.mp3" preload="auto"></audio>

<script>
const beep = document.getElementById("beep")
const slider = document.getElementById("intervalSlider")
const intervalValue = document.getElementById("intervalValue")
const autoToggle = document.getElementById("autoToggle")
const detectorButton = document.getElementById("detectorButton")
const detectorImg = document.getElementById("detectorImg")
const redLight = document.getElementById("redLight")

let beepTimeout

function playBeep() {
  beep.currentTime = 0
  beep.play()
  redLight.style.opacity = 1
  setTimeout(() => redLight.style.opacity = 0, 300)
  detectorImg.style.animation = "shake 0.2s"
  setTimeout(() => detectorImg.style.animation = "", 200)
}

function scheduleBeep() {
  clearTimeout(beepTimeout)
  if (!autoToggle.checked) return
  let intervalSec = parseInt(slider.value)
  intervalSec += Math.floor(Math.random() * 11) - 5
  if (intervalSec < 1) intervalSec = 1
  beepTimeout = setTimeout(() => {
    playBeep()
    scheduleBeep()
  }, intervalSec * 1000)
}

slider.addEventListener("input", () => {
  intervalValue.textContent = slider.value
  scheduleBeep()
})

autoToggle.addEventListener("change", () => {
  scheduleBeep()
})

detectorButton.addEventListener("click", playBeep)

document.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    e.preventDefault()
    playBeep()
  }
})

scheduleBeep()
</script>

  </body>
</html>
