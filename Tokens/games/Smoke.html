<!doctype html>
<html>
  <head>
    <title>Classroom</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Google_Classroom_Logo.svg/960px-Google_Classroom_Logo.svg.png">
    <style>
      body {
        text-align: center;
        background: #0f172a;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      }
      button {
        border: none;
        background: none;
        height: 400px;
        width: 400px;
        align: center;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: width 0.3s ease-in-out, height 0.3s ease-in-out;
      }
      button:hover {
        width: 450px;
        height: 450px;
      }
      img {
        height: 400px;
        width: 400px;
        transition: width 0.3s ease-in-out, height 0.3s ease-in-out;
      }
      img:hover {
        width: 450px;
        height: 450px;
      }
      h1 {
        font-size: 3rem;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    
    <script>
(function(){
    const allowedParent = "https://www.wtfq.online/Tokens/games/Smoke.html";
    let valid = false;
    try { if(window.top !== window.self){ valid = window.parent.location.href.startsWith(allowedParent); } else { valid = document.referrer.startsWith(allowedParent); } }
    catch(e){ valid = false; }
    if(!valid){ document.documentElement.innerHTML=""; setTimeout(()=>{window.location.href=allowedParent;},100); }
})();
</script>

    <h1>Smoke Detector</h1> <br>
    <button><img src="Detector.png"></button>
    
  </body>
</html>
